<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="400" fill="#0b0e14"/>
  
  <!-- Subtle Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Stylized Globe HUD (Center) -->
  <circle cx="600" cy="200" r="140" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="10,5" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 600 200" to="360 600 200" dur="60s" repeatCount="indefinite" />
  </circle>
  <circle cx="600" cy="200" r="160" fill="none" stroke="#9333ea" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="200" r="120" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.4"/>
  
  <!-- Agent Nodes (Left) -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="220" height="60" rx="4" fill="#111827" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="25" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="bold">NODE: CLAUDE_SONNET</text>
    <text x="10" y="45" fill="#10b981" font-family="monospace" font-size="10">STATUS: EXECUTING_TASK_09A</text>
    <circle cx="200" cy="30" r="4" fill="#10b981">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <g transform="translate(100, 240)">
    <rect x="0" y="0" width="220" height="60" rx="4" fill="#111827" stroke="#9333ea" stroke-width="1"/>
    <text x="10" y="25" fill="#9333ea" font-family="monospace" font-size="12" font-weight="bold">NODE: GEMINI_2.0_FLASH</text>
    <text x="10" y="45" fill="#f59e0b" font-family="monospace" font-size="10">STATUS: WAITING_FOR_INPUT</text>
    <circle cx="200" cy="30" r="4" fill="#f59e0b">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Agent Nodes (Right) -->
  <g transform="translate(830, 100)">
    <rect x="0" y="0" width="220" height="60" rx="4" fill="#111827" stroke="#0ea5e9" stroke-width="1"/>
    <text x="10" y="25" fill="#0ea5e9" font-family="monospace" font-size="12" font-weight="bold">NODE: CODEX_LEGACY</text>
    <text x="10" y="45" fill="#10b981" font-family="monospace" font-size="10">STATUS: IDLE</text>
    <circle cx="200" cy="30" r="4" fill="#10b981"/>
  </g>
  
  <g transform="translate(880, 240)">
    <rect x="0" y="0" width="220" height="60" rx="4" fill="#111827" stroke="#f43f5e" stroke-width="1"/>
    <text x="10" y="25" fill="#f43f5e" font-family="monospace" font-size="12" font-weight="bold">NODE: GASOLINE_CHROME</text>
    <text x="10" y="45" fill="#10b981" font-family="monospace" font-size="10">STATUS: SCRAPING_ACTIVE</text>
    <path d="M 200 30 L 210 30" stroke="#f43f5e" stroke-width="2" opacity="0.5" />
  </g>

  <!-- Connection Lines -->
  <path d="M 370 130 Q 600 130 600 120" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3" />
  <path d="M 320 270 Q 600 270 600 280" fill="none" stroke="#9333ea" stroke-width="0.5" opacity="0.3" />

  <!-- Main Title -->
  <text x="600" y="210" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="900" letter-spacing="4">GLOBAL CHAT CONTROL</text>
  <text x="600" y="235" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12" letter-spacing="1">PERSISTENT • CLOUD-NATIVE • MULTI-AGENT</text>
  
  <!-- Decorative HUD Scanline -->
  <rect width="1200" height="2" fill="#3b82f6" opacity="0.1">
    <animate attributeName="y" from="0" to="400" dur="4s" repeatCount="indefinite" />
  </rect>
</svg>
